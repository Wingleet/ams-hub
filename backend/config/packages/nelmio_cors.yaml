nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin:
            - "http://localhost"
            - "http://127.0.0.1"
            - "http://localhost:5173"
            - "http://127.0.0.1:5173"
            - "http://localhost:5174"
            - "http://127.0.0.1:5174"
        allow_methods: ["GET", "OPTIONS", "POST", "PUT", "PATCH", "DELETE"]
        allow_headers: ["Content-Type", "Authorization", "X-Requested-With"]
        expose_headers:
            ["Content-Range", "X-Content-Range", "Link", "Set-Cookie"]
        allow_credentials: true
        max_age: 3600
    paths:
        "^/api":
            allow_origin:
                [
                    "http://localhost",
                    "http://127.0.0.1",
                    "http://localhost:5173",
                    "http://127.0.0.1:5173",
                    "http://localhost:5174",
                    "http://127.0.0.1:5174",
                ]
            allow_credentials: true
            allow_headers:
                ["Content-Type", "Authorization", "X-Requested-With", "Accept"]
            allow_methods: ["GET", "OPTIONS", "POST", "PUT", "PATCH", "DELETE"]
            expose_headers:
                ["Content-Range", "X-Content-Range", "Link", "Set-Cookie"]
            max_age: 3600
